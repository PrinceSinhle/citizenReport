<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Witbank Community Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e2a3e;
            padding: 1.5rem;
        }
        
        .page-container {
            width: 100%;
            max-width: 480px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .page-header h1 {
            color: #1f6392;
            font-size: 34px;
            margin-bottom: 10px;
        }
        
        .page-header p {
            color: #4a5b6e;
            font-size: 16px;
        }
        
        .card {
            background: white;
            padding: 40px 36px;
            border-radius: 24px;
            border: 1px solid #e9edf2;
            box-shadow: 0 18px 45px rgba(15, 30, 60, 0.08);
        }
        
        .card h2 {
            color: #1f6392;
            font-size: 24px;
            margin-bottom: 28px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 8px;
            color: #34415a;
            font-size: 14px;
            font-weight: 600;
        }
        
        .form-group input {
            padding: 14px 16px;
            border: 1px solid #d9e2ec;
            border-radius: 14px;
            font-size: 15px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1f6392;
            box-shadow: 0 0 0 3px rgba(31, 99, 146, 0.12);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1f6392;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease;
            box-shadow: 0 12px 24px rgba(31, 99, 146, 0.18);
        }
        
        .login-btn:hover {
            background: #0c4d79;
            transform: translateY(-1px);
        }
        
        .error-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #fff4f6;
            color: #b00020;
            border: 1px solid #f5c6cb;
            text-align: center;
            font-size: 14px;
        }
        
        .helper-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 24px;
            text-align: center;
        }
        
        .helper-row a {
            color: #1f6392;
            text-decoration: none;
            font-weight: 600;
        }
        
        .helper-row a:hover {
            color: #0c4d79;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <h1>Witbank Community Service</h1>
            <p>Sign in to report issues and track progress in your community.</p>
        </div>
        
        <div class="card">
            <h2>Login</h2>

            <div class="error-box" th:if="${param.error}">
                Invalid email or password. Please try again.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="Enter your email"
                           required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Enter your password"
                           required>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="helper-row">
                <a th:href="@{/register}">Create a new account</a>
                <a th:href="@{/}">Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
